name: PR Check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  # Check PR title follows conventional commits format
  pr-title:
    runs-on: ubuntu-24.04
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            ci
            build
            perf
            style
            deps
            revert
            bump
          subjectPattern: ^[a-z0-9].*$
          subjectPatternError: subject must start with a lowercase letter or digit

  # Run clang-tidy static analysis
  clang-tidy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libsodium-dev clang-tidy

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          # Filter out GCC-specific warning flags that clang-tidy doesn't understand
          sed -i 's/-Wno-stringop-overflow//g; s/-Wno-stringop-overread//g; s/-Wno-array-bounds//g' build/compile_commands.json
          find src tests -type f -name "*.cpp" -print0 | \
            xargs -0 clang-tidy -p build -header-filter='.*' --warnings-as-errors='*'
