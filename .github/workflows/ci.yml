name: CI

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Test ${{ matrix.target.id }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: linux-x86_64
            runner: ubuntu-24.04
            platform: linux
          - id: linux-aarch64
            runner: ubuntu-24.04-arm
            platform: linux
          - id: macos-x86_64
            runner: macos-15-intel
            platform: macos
          - id: macos-aarch64
            runner: macos-15
            platform: macos
          - id: windows-x86_64
            runner: windows-2025
            platform: windows
            vcpkg_triplet: x64-windows
            cmake_arch: x64
          - id: windows-aarch64
            runner: windows-11-arm
            platform: windows
            vcpkg_triplet: arm64-windows
            cmake_arch: ARM64
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: matrix.target.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libsodium-dev

      - name: Install macOS dependencies
        if: matrix.target.platform == 'macos'
        run: |
          brew install cmake pkg-config libsodium

      - name: Bootstrap vcpkg
        if: matrix.target.platform == 'windows'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:RUNNER_TEMP\vcpkg"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          & "$env:RUNNER_TEMP\vcpkg\vcpkg.exe" install "libsodium:${{ matrix.target.vcpkg_triplet }}"
          & "$env:RUNNER_TEMP\vcpkg\vcpkg.exe" install "pthreads:${{ matrix.target.vcpkg_triplet }}"

      - name: Configure CMake (Unix)
        if: matrix.target.platform != 'windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Windows)
        if: matrix.target.platform == 'windows'
        shell: pwsh
        run: |
          cmake -B build `
            -G "Visual Studio 17 2022" `
            -A "${{ matrix.target.cmake_arch }}" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:RUNNER_TEMP\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET="${{ matrix.target.vcpkg_triplet }}"

      - name: Build (Unix)
        if: matrix.target.platform != 'windows'
        run: cmake --build build --parallel

      - name: Build (Windows)
        if: matrix.target.platform == 'windows'
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Run unit tests (Unix)
        if: matrix.target.platform != 'windows'
        working-directory: build
        run: ctest --output-on-failure -L unit --parallel

      - name: Run unit tests (Windows)
        if: matrix.target.platform == 'windows'
        working-directory: build
        shell: pwsh
        run: ctest --output-on-failure -C Release -L unit --parallel

      - name: Run integration tests (Unix)
        if: matrix.target.platform != 'windows'
        working-directory: build
        run: ctest --output-on-failure -L integration --parallel

      - name: Run integration tests (Windows)
        if: matrix.target.platform == 'windows'
        working-directory: build
        shell: pwsh
        run: ctest --output-on-failure -C Release -L integration --parallel

  build-installers:
    name: Package ${{ matrix.target.id }}
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: linux-x86_64
            runner: ubuntu-24.04
            platform: linux
            generator: "DEB;RPM"
          - id: linux-aarch64
            runner: ubuntu-24.04-arm
            platform: linux
            generator: "DEB;RPM"
          - id: macos-x86_64
            runner: macos-15-intel
            platform: macos
            generator: "productbuild"
          - id: macos-aarch64
            runner: macos-15
            platform: macos
            generator: "productbuild"
          - id: windows-x86_64
            runner: windows-2025
            platform: windows
            generator: "WIX"
            vcpkg_triplet: x64-windows
            cmake_arch: x64
          - id: windows-aarch64
            runner: windows-11-arm
            platform: windows
            generator: "WIX"
            vcpkg_triplet: arm64-windows
            cmake_arch: ARM64
    env:
      RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Derive version from tag
        id: version
        shell: bash
        run: echo "version=${RELEASE_VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Install Linux dependencies
        if: matrix.target.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libsodium-dev rpm

      - name: Install macOS dependencies
        if: matrix.target.platform == 'macos'
        run: |
          brew install cmake pkg-config libsodium

      - name: Bootstrap vcpkg (Windows)
        if: matrix.target.platform == 'windows'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:RUNNER_TEMP\vcpkg"
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          & "$env:RUNNER_TEMP\vcpkg\vcpkg.exe" install "libsodium:${{ matrix.target.vcpkg_triplet }}" "pthreads:${{ matrix.target.vcpkg_triplet }}"

      - name: Add WiX to PATH (Windows)
        if: matrix.target.platform == 'windows'
        shell: pwsh
        run: |
          $wixCandidates = @(
            "C:\Program Files (x86)\WiX Toolset v3.14\bin",
            "C:\Program Files\WiX Toolset v3.14\bin"
          )

          $wixDir = $wixCandidates | Where-Object { Test-Path (Join-Path $_ "candle.exe") } | Select-Object -First 1
          if (-not $wixDir) {
            choco install wixtoolset --yes --no-progress
            $wixDir = $wixCandidates | Where-Object { Test-Path (Join-Path $_ "candle.exe") } | Select-Object -First 1
          }

          if (-not $wixDir) {
            Write-Error "WiX Toolset v3 was not found after installation."
            exit 1
          }

          echo "$wixDir" >> $env:GITHUB_PATH

      - name: Configure (Unix)
        if: matrix.target.platform != 'windows'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DTOXTUNNEL_BUILD_TESTS=OFF \
            -DRELEASE_VERSION="${{ steps.version.outputs.version }}"

      - name: Configure (Windows)
        if: matrix.target.platform == 'windows'
        shell: pwsh
        run: |
          cmake -B build `
            -G "Visual Studio 17 2022" `
            -A "${{ matrix.target.cmake_arch }}" `
            -DCMAKE_BUILD_TYPE=Release `
            -DTOXTUNNEL_BUILD_TESTS=OFF `
            -DRELEASE_VERSION="${{ steps.version.outputs.version }}" `
            -DCMAKE_TOOLCHAIN_FILE="$env:RUNNER_TEMP\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET="${{ matrix.target.vcpkg_triplet }}"

      - name: Build (Unix)
        if: matrix.target.platform != 'windows'
        run: cmake --build build --parallel

      - name: Build (Windows)
        if: matrix.target.platform == 'windows'
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Package (Unix)
        if: matrix.target.platform != 'windows'
        working-directory: build
        run: cpack -G "${{ matrix.target.generator }}"

      - name: Package (Windows)
        if: matrix.target.platform == 'windows'
        working-directory: build
        shell: pwsh
        run: |
          cpack -C Release -G "${{ matrix.target.generator }}" --verbose
          if ($LASTEXITCODE -ne 0) {
            $wixLog = Get-ChildItem -Recurse -Filter "wix.log" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($wixLog) { Get-Content $wixLog.FullName }
            exit 1
          }

      - name: Verify macOS package
        if: matrix.target.platform == 'macos'
        run: |
          bash tests/packaging/verify_macos_pkg.sh build/*.pkg "${{ steps.version.outputs.version }}"

      - name: Verify Windows install tree
        if: matrix.target.platform == 'windows'
        shell: pwsh
        run: |
          $stage = Join-Path $env:RUNNER_TEMP "toxtunnel-stage"
          cmake --install build --config Release --prefix $stage
          & "${{ github.workspace }}\tests\packaging\verify_windows_install.ps1" `
            -InstallRoot $stage `
            -ExpectedVersion "${{ steps.version.outputs.version }}"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: installer-${{ matrix.target.id }}
          path: |
            build/*.deb
            build/*.rpm
            build/*.pkg
            build/*.msi
          if-no-files-found: error

  code-style-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
      - name: Check code formatting
        run: |
          find include src tests -type f \( -name "*.cpp" -o -name "*.hpp" \) -print0 | \
            xargs -0 clang-format --dry-run --Werror -style=file

  build-debug:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libsodium-dev
      - name: Configure CMake (Debug with ASan)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug -DTOXTUNNEL_ENABLE_ASAN=ON
      - name: Build
        run: |
          cmake --build build --parallel
      - name: Run tests with ASan
        working-directory: build
        run: |
          ctest --output-on-failure --parallel
        env:
          ASAN_OPTIONS: detect_leaks=0

  publish-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-and-test
      - build-installers
      - code-style-check
      - build-debug
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: installer-*
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          overwrite_files: true
